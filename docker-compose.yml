version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: smart_leads_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smart_leads_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_leads_backend
    ports:
      - "5000:5000"
    env_file:
      - .env.development
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart_leads
      - JWT_SECRET=supersecretjwtkeychangeinproduction
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - smart_leads_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_leads_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - smart_leads_net
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  smart_leads_net:
    driver: bridge
